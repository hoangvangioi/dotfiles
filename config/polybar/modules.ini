[module/temperature]
type = internal/temperature

; Seconds to sleep between updates
; Default: 1
interval = 0.5

; Thermal zone to use
; To list all the zone types, run 
; $ for i in /sys/class/thermal/thermal_zone*; do echo "$i: $(<$i/type)"; done
; Default: 0
thermal-zone = 0

; Full path of temperature sysfs path
; Use `sensors` to find preferred temperature source, then run
; $ for i in /sys/class/hwmon/hwmon*/temp*_input; do echo "$(<$(dirname $i)/name): $(cat ${i%_*}_label 2>/dev/null || echo $(basename ${i%_*})) $(readlink -f $i)"; done
; to find path to desired file
; Default reverts to thermal zone setting
;;hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon2/temp1_input
;hwmon-path = /sys/devices/pci0000:00/0000:00:01.3/0000:01:00.0/hwmon/hwmon0/temp1_input

; Threshold temperature to display warning label (in degrees celsius)
; Default: 80
warn-temperature = 80

; Whether or not to show units next to the temperature tokens (¬įC, ¬įF)
; Default: true
units = true

; Available tags:
;   <label> (default)
;   <ramp>
format = <ramp><label>
;format = <label>
;format-prefix = "Óźį"
;format-prefix-foreground = ${colors.cyan}
;format-prefix-background = ${colors.bg1}
;format-background = ${colors.black}
;format-padding = 1

; Available tags:
;   <label-warn> (default)
;   <ramp>
;format-warn = <ramp><label-warn>
format-warn = <label-warn>
format-warn-prefix = "Óźį"
format-warn-prefix-foreground = ${colors.yellow}
format-warn-prefix-background = ${colors.bg1}
;format-warn-background = ${colors.shade4}
;format-warn-foreground = ${colors.background}
;format-warn-padding = 1

; Available tokens:
;   %temperature% (deprecated)
;   %temperature-c%   (default, temperature in ¬įC)
;   %temperature-f%   (temperature in ¬įF)
label = " %temperature-c% "
label-foreground = ${colors.fg}
label-background = ${colors.bg1}

; Available tokens:
;   %temperature% (deprecated)
;   %temperature-c%   (default, temperature in ¬įC)
;   %temperature-f%   (temperature in ¬įF)
label-warn = " %temperature-c% "
label-warn-foreground = ${colors.red}
label-warn-background = ${colors.bg1}

; Requires the <ramp> tag
; The icon selection will range from 0 to `warn-temperature`
; with the current temperature as index.
ramp-0 = "Óćé"
ramp-1 = "Óćé"
ramp-2 = "Óćź"
ramp-3 = "Óćź"
ramp-4 = "Óćź"
ramp-font = 6
ramp-foreground = ${colors.bluedark}
ramp-background = ${colors.bg1}

